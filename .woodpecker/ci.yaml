# Headlamp Sealed Secrets Plugin — lint, type-check, test, build
when:
  - event: manual
  - event: push
    branch: main
  - event: pull_request

steps:
  - name: install
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    commands:
      - mkdir -p /woodpecker/cache/headlamp-sealed-secrets/pnpm-store
      - pnpm config set store-dir /woodpecker/cache/headlamp-sealed-secrets/pnpm-store
      - pnpm install --frozen-lockfile

  - name: lint
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    commands:
      - pnpm run lint

  - name: tsc
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    commands:
      - pnpm run tsc

  - name: test
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    commands:
      - pnpm test

  - name: build
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    commands:
      - pnpm run build
