# Headlamp Sealed Secrets Plugin — lint, type-check, test, build
when:
  - event: manual
  - event: push
    branch: main
  - event: pull_request

steps:
  - name: install
    image: dhi.io/node:24.14.0-debian13-dev@sha256:1ad99a6e6c7052c72c18668ff92c9073b5c69c3e7d8a42e766deeda13c2b1cc8
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    commands:
      - mkdir -p /woodpecker/cache/headlamp-sealed-secrets/pnpm-store
      - pnpm config set store-dir /woodpecker/cache/headlamp-sealed-secrets/pnpm-store
      - pnpm install --frozen-lockfile

  - name: lint
    image: dhi.io/node:24.14.0-debian13-dev@sha256:1ad99a6e6c7052c72c18668ff92c9073b5c69c3e7d8a42e766deeda13c2b1cc8
    commands:
      - pnpm run lint

  - name: tsc
    image: dhi.io/node:24.14.0-debian13-dev@sha256:1ad99a6e6c7052c72c18668ff92c9073b5c69c3e7d8a42e766deeda13c2b1cc8
    commands:
      - pnpm run tsc

  - name: test
    image: dhi.io/node:24.14.0-debian13-dev@sha256:1ad99a6e6c7052c72c18668ff92c9073b5c69c3e7d8a42e766deeda13c2b1cc8
    commands:
      - pnpm test

  - name: build
    image: dhi.io/node:24.14.0-debian13-dev@sha256:1ad99a6e6c7052c72c18668ff92c9073b5c69c3e7d8a42e766deeda13c2b1cc8
    commands:
      - pnpm run build
