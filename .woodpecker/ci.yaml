# Headlamp Sealed Secrets Plugin — lint, type-check, test, build
when:
  - event: manual
  - event: push
    branch: main
  - event: pull_request

steps:
  - name: install
    image: dhi.io/node:22.22.1-debian13-dev@sha256:b9250f7afdd96a1f7be89e0027b552703ad2e544cea90ba8c6c339969663a6f2
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    commands:
      - mkdir -p /woodpecker/cache/headlamp-sealed-secrets/pnpm-store
      - pnpm config set store-dir /woodpecker/cache/headlamp-sealed-secrets/pnpm-store
      - pnpm install --frozen-lockfile

  - name: lint
    image: dhi.io/node:22.22.1-debian13-dev@sha256:b9250f7afdd96a1f7be89e0027b552703ad2e544cea90ba8c6c339969663a6f2
    commands:
      - pnpm run lint

  - name: tsc
    image: dhi.io/node:22.22.1-debian13-dev@sha256:b9250f7afdd96a1f7be89e0027b552703ad2e544cea90ba8c6c339969663a6f2
    commands:
      - pnpm run tsc

  - name: test
    image: dhi.io/node:22.22.1-debian13-dev@sha256:b9250f7afdd96a1f7be89e0027b552703ad2e544cea90ba8c6c339969663a6f2
    commands:
      - pnpm test

  - name: build
    image: dhi.io/node:22.22.1-debian13-dev@sha256:b9250f7afdd96a1f7be89e0027b552703ad2e544cea90ba8c6c339969663a6f2
    commands:
      - pnpm run build
