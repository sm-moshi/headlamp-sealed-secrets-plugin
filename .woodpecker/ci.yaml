# Headlamp Sealed Secrets Plugin — lint, type-check, test, build
when:
  - event: manual
  - event: push
    branch: main
  - event: pull_request

variables:
  - &cache_image "meltwater/drone-cache@sha256:f4429bda3e4f2af2cceb40deee10b8cc5613aae7c8b08ad15c54109cad7fa9a3"
  - &cache_settings
    access_key:
      from_secret: garage_s3_access_key
    secret_key:
      from_secret: garage_s3_secret_key
    backend: s3
    endpoint: http://garage.garage.svc.cluster.local:3900
    bucket: buildkit-cache
    region: garage
    path_style: true
    archive_format: zstd
    cache_key: "sealed-secrets-plugin-{{ checksum \"pnpm-lock.yaml\" }}"
    mount:
      - .pnpm-store

steps:
  - name: restore-cache
    failure: ignore
    image: *cache_image
    settings:
      <<: *cache_settings
      restore: true

  - name: install
    image: dhi.io/node:22.22.1-debian13-dev
    commands:
      - pnpm config set store-dir /woodpecker/src/github.com/sm-moshi/headlamp-sealed-secrets-plugin/.pnpm-store
      - pnpm install --frozen-lockfile

  - name: lint
    image: dhi.io/node:22.22.1-debian13-dev
    commands:
      - pnpm run lint

  - name: tsc
    image: dhi.io/node:22.22.1-debian13-dev
    commands:
      - pnpm run tsc

  - name: test
    image: dhi.io/node:22.22.1-debian13-dev
    commands:
      - pnpm test

  - name: build
    image: dhi.io/node:22.22.1-debian13-dev
    commands:
      - pnpm run build

  - name: rebuild-cache
    failure: ignore
    image: *cache_image
    settings:
      <<: *cache_settings
      rebuild: true
