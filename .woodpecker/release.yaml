# Headlamp Sealed Secrets Plugin — release pipeline
#
# Triggered by version tags (v*). Builds the plugin tarball, creates a
# GitHub release with the tarball attached, and updates artifacthub-pkg.yml
# with the archive URL and checksum so ArtifactHub picks up the new version.
#
# Release workflow:
#   1. Bump version in package.json
#   2. Commit: "release: vX.Y.Z"
#   3. Tag:    git tag vX.Y.Z
#   4. Push:   git push && git push --tags
#   5. This pipeline runs automatically
when:
  - event: tag
    ref: refs/tags/v*

variables:
  - &cache_image "meltwater/drone-cache@sha256:f4429bda3e4f2af2cceb40deee10b8cc5613aae7c8b08ad15c54109cad7fa9a3"
  - &cache_settings
    access_key:
      from_secret: garage_s3_access_key
    secret_key:
      from_secret: garage_s3_secret_key
    backend: s3
    endpoint: http://garage.garage.svc.cluster.local:3900
    bucket: buildkit-cache
    region: garage
    path_style: true
    archive_format: zstd
    cache_key: "sealed-secrets-plugin-{{ checksum \"pnpm-lock.yaml\" }}"
    mount:
      - .pnpm-store

steps:
  - name: verify-version
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    commands:
      - |
        TAG_VERSION="${CI_COMMIT_TAG#v}"
        PKG_VERSION=$(node -p "require('./package.json').version")
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "ERROR: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
          echo "Bump package.json version before tagging."
          exit 1
        fi
        echo "Version verified: $TAG_VERSION"

  - name: restore-cache
    failure: ignore
    image: *cache_image
    settings:
      <<: *cache_settings
      restore: true

  - name: install
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    commands:
      - pnpm config set store-dir /woodpecker/src/github.com/sm-moshi/headlamp-sealed-secrets-plugin/.pnpm-store
      - pnpm install --frozen-lockfile

  - name: quality-checks
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    commands:
      - pnpm run tsc
      - pnpm test

  - name: build-and-package
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    commands:
      - pnpm run build
      - pnpm run package
      - ls -la *.tar.gz

  - name: github-release
    image: woodpeckerci/plugin-release@sha256:caf18bc34de626dff1de0cc0638ee8dff11af6c9372a5f3d79ab27b91a5ee4d9
    settings:
      api_key:
        from_secret: github_token
      base_url: https://api.github.com
      files:
        - "*.tar.gz"
      checksum:
        - sha256
      title: "${CI_COMMIT_TAG}"
      draft: false

  - name: update-artifacthub
    image: dhi.io/node:22.22.1-debian13-dev@sha256:6c791989a1cb816cffd99cac2778f6a36233674855880823d6e99cd283e2afc0
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        VERSION="${CI_COMMIT_TAG#v}"
        TARBALL=$$(ls sealed-secrets-*.tar.gz)
        CHECKSUM=$$(sha256sum "$$TARBALL" | cut -d' ' -f1)
        DATE=$$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        ARCHIVE_URL="https://github.com/${CI_REPO}/releases/download/${CI_COMMIT_TAG}/$$TARBALL"

        echo "Version:  $$VERSION"
        echo "Tarball:  $$TARBALL"
        echo "Checksum: $$CHECKSUM"
        echo "URL:      $$ARCHIVE_URL"

        # Update artifacthub-pkg.yml fields
        sed -i "s|^version: .*|version: \"$$VERSION\"|" artifacthub-pkg.yml
        sed -i "s|^createdAt: .*|createdAt: \"$$DATE\"|" artifacthub-pkg.yml
        sed -i "s|headlamp/plugin/archive-url: .*|headlamp/plugin/archive-url: \"$$ARCHIVE_URL\"|" artifacthub-pkg.yml
        sed -i "s|headlamp/plugin/archive-checksum: .*|headlamp/plugin/archive-checksum: sha256:$$CHECKSUM|" artifacthub-pkg.yml

        echo "--- Updated artifacthub-pkg.yml ---"
        grep -A2 'version:' artifacthub-pkg.yml | head -3
        grep 'archive-url\|archive-checksum' artifacthub-pkg.yml

        # Commit and push to main
        git config user.name "Woodpecker CI"
        git config user.email "ci@m0sh1.cc"
        git remote set-url origin "https://x-access-token:$$GITHUB_TOKEN@github.com/${CI_REPO}.git"
        git fetch origin main
        git checkout main

        git add artifacthub-pkg.yml
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git commit -m "chore(release): update ArtifactHub metadata for ${CI_COMMIT_TAG}"
        git push origin main

  - name: rebuild-cache
    failure: ignore
    image: *cache_image
    settings:
      <<: *cache_settings
      rebuild: true
